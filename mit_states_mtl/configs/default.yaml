# ============================================================
#  MIT States MTL — 默认超参配置
# ============================================================

# ── 数据 ────────────────────────────────────────────────────
data:
  # 指向 release_dataset/ 目录，其下应有 images/<adj> <noun>/ 子目录
  # 从项目根（mit_states_mtl/）运行时此相对路径有效
  root: "./datasets/release_dataset"
  batch_size: 64
  num_workers: 4
  split_ratio: [0.70, 0.15, 0.15]
  seed: 42
  min_samples: 2      # 组合样本数低于此值则丢弃（长尾过滤）
  pin_memory: true

# ── 模型 ────────────────────────────────────────────────────
model:
  backbone: "resnet50"     # resnet18 | resnet34 | resnet50 | resnet101
  pretrained: true
  head_hidden_dim: 512
  head_dropout: 0.5
  freeze_backbone: false   # true = 前 N epoch 只训练分类头

# ── 损失函数 ─────────────────────────────────────────────────
loss:
  mode: "static"           # static | dynamic
  alpha: 0.5               # 仅 static：object 分支权重
  use_class_weights: true  # 是否使用类别逆频率权重
  label_smoothing: 0.1

# ── 优化器 ───────────────────────────────────────────────────
optimizer:
  name: "adamw"            # adam | adamw | sgd
  lr: 1.0e-4               # 分类头学习率
  backbone_lr: 1.0e-5      # backbone 差分学习率
  weight_decay: 1.0e-4
  momentum: 0.9            # 仅 SGD 使用

# ── 学习率调度 ───────────────────────────────────────────────
scheduler:
  name: "cosine"           # cosine | step | plateau
  warmup_epochs: 3
  min_lr: 1.0e-6
  step_size: 10            # step scheduler 专用
  gamma: 0.1
  patience: 5              # plateau scheduler 专用
  factor: 0.5

# ── 训练控制 ─────────────────────────────────────────────────
training:
  epochs: 50
  unfreeze_epoch: 5        # freeze_backbone=true 时，此 epoch 后解冻
  unfreeze_layers: null    # null=全部解冻；正整数=只解冻最后 N 层
  grad_clip: 1.0           # 梯度裁剪（0 = 不裁剪）
  early_stop_patience: 10  # 基于 val joint_acc 的早停轮数
  log_interval: 50         # 每 N 个 batch 打印一次训练日志
  checkpoint_dir: "./checkpoints"
  save_best_only: true

# ── 随机种子 ─────────────────────────────────────────────────
seed: 42
